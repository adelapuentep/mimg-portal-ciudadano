<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Ciudadano</title>
    <script>
      // Safe guard to prevent "Cannot set property fetch of #<Window> which has only a getter" error
      try {
        const originalFetch = window.fetch;
        let customFetch = originalFetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return customFetch || originalFetch;
          },
          set(value) {
            customFetch = value;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("Could not redefine window.fetch setter:", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
